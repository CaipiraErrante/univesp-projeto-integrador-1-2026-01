<form class="d-flex" method="post" action="/accounts/login/">
  {% csrf_token %}  
  <div class="col">
    <div class="mb-3">
      <label for="" class="form-label"> Nome de usuário: </label>
      <input type="text" name="login" id="id_login" class="form-control" aria-describedby="helpId">
      <small id="helpId" class="text-body-secondary"> Help text </small>
    </div>
    <div class="mb-3">
      <label for="" class="form-label"> Password: </label>
      <input type="password" class="form-control" name="password" id="id_password">
    </div>
    <div class="form-check form-check-inline">
      <label class="form-check-label" for=""> Lembrar de mim: </label>
      <input class="form-check-input" type="checkbox" id="id_remember" name="remember">            
    <div class="mb-3">
      <button class="btn btn-primary" type="submit"> Entrar </button>
    </div>
  </div>
</form>
{% if errors %}  <div class="mb-3"> {{ errors }} </div> {% endif %}
<div class="mb-3"> <a href="/accounts/password/reset/">[Nova Senha]</a>  <a href="/accounts/signup/">[Nova Conta]</a> </div>
