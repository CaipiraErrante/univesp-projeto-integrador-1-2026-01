<form method="post" action="/users/profile/"> 
  {% csrf_token %}
  <div class="col">
    <div class="mb-3">
      <label for="" class="form-label">Usuário:</label>
      <input type="text" name="login" id="id_login" class="form-control" aria-describedby="loguinHelpId">
      <small id="loginHelpId" class="text-body-secondary"> Help text </small>
    <div class="mb-3">
      <label for="" class="form-label">Password</label>
      <input type="password" class="form-control" name="password" id="id_password">
    </div>  
    <div class="mb-3">
      <label for="" class="form-label">Email</label>
      <input type="email" class="form-control" name="email" id="id_email" aria-describedby="emailHelpId">
      <small id="emailHelpId" class="form-text text-body-secondary"> Help text </small>
    </div>
    <div class="mb-3">
      <label for="" class="form-label">Nome:</label>
      <input type="text" name="first_name" id="id_first_name" class="form-control" aria-describedby="first_nameHelpId">
      <small id="first_nameHelpId" class="text-body-secondary"> Help text </small>
    </div>
    <div class="mb-3">
      <label for="" class="form-label">Sobrenome:</label>
      <input type="text" name="last_name" id="id_last_name" class="form-control" aria-describedby="last_nameHelpId">
      <small id="last_nameHelpId" class="text-body-secondary"> Help text </small>
    </div>
    <div class="mb-3">
      <button class="btn btn-primary" type="submit"> Salvar alterações </button>
    </div>
  </div> 
</form>
{% if errors %}  <div class="mb-3"> {{ errors }} </div> {% endif %}
<div class="mb-3"> <a href="/accounts/password/change/">[Alterar Senha]</a>  <a href="/accounts/logout/">[LogOut]</a> </div>
